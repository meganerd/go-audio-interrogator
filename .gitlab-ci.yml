stages:
  - test
  - build

variables:
  GOPATH: ${CI_PROJECT_DIR}/.go
  GOFLAGS: "-mod=readonly"

default:
  image: golang:1.24
  tags:
    - docker
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/

test:
  stage: test
  script:
    - go build ./...  # no tests yet — verify compilation

lint:
  stage: test
  script:
    - go vet ./...

build:
  stage: build
  script:
    - go build -ldflags "-X main.version=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}" -o go-audio-interrogator ./cmd/go-audio-interrogator/
  artifacts:
    paths:
      - go-audio-interrogator
    expire_in: 1 week
  needs:
    - test
    - lint
